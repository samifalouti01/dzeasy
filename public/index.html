<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Primary Meta Tags -->
    <title>Dz Easy</title>
    <meta name="title" content="Your Website Title Here" />
    <meta name="description" content="A brief, compelling description of your website's purpose and value." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourwebsite.com" />
    <meta property="og:title" content="Your Website Title Here" />
    <meta property="og:description" content="A brief, compelling description of your website." />
    <meta property="og:image" content="%PUBLIC_URL%/path-to-your-og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://yourwebsite.com" />
    <meta property="twitter:title" content="Your Website Title Here" />
    <meta property="twitter:description" content="A brief, compelling description of your website." />
    <meta property="twitter:image" content="%PUBLIC_URL%/path-to-your-twitter-image.jpg" />

    <!-- Canonical Link -->
    <link rel="canonical" href="https://yourwebsite.com" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://yourwebsite.com",
        "name": "Your Website Title Here",
        "description": "A brief, compelling description of your website.",
        "publisher": {
          "@type": "Organization",
          "name": "Your Organization Name"
        }
      }
    </script>

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
